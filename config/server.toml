# Configuración del servidor PyAO
# Todas las opciones también pueden sobreescribirse con variables de entorno.
# Ejemplo: PYAO_SERVER__PORT=8000

[server]
host = "0.0.0.0"
port = 7666
max_connections = 1000
buffer_size = 4096

[redis]
host = "localhost"
port = 6379
db = 0
max_connections = 20

[logging]
level = "INFO"
format = "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
file = "logs/server.log"

[game]
max_players_per_map = 100
respawn_check_interval = 5.0
npc_respawn_base_time = 30.0
npc_respawn_random_variance = 15.0

[game.combat]
melee_range = 1
base_critical_chance = 0.15
base_dodge_chance = 0.05
defense_per_level = 0.1
armor_reduction = 0.1
critical_damage_multiplier = 2.0
critical_agi_modifier = 0.005
dodge_agi_modifier = 0.007
max_critical_chance = 0.50
max_dodge_chance = 0.40
base_agility = 10

[game.work]
exp_wood = 10
exp_mineral = 15
exp_fish = 12
exp_per_level = 100
max_work_distance = 1

[game.stamina]
max_stamina = 100
stamina_regen_rate = 1.0
stamina_drain_rate = 2.0
cost_walk = 1
cost_attack = 2
cost_spell = 3
cost_work = 5
regen_tick = 2
regen_resting = 5

[game.hunger_thirst]
enabled = true
interval_sed = 180
interval_hambre = 180
reduccion_agua = 10
reduccion_hambre = 10

[game.gold_decay]
enabled = true
percentage = 1.0
interval_seconds = 60.0

[game.inventory]
max_slots = 30

[game.bank]
max_slots = 40

[game.character]
hp_per_con = 10
mana_per_int = 50000
initial_gold = 0
initial_elu = 300
elu_exponent = 1.8
