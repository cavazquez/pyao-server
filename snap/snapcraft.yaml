name: pyao
base: core26
build-base: devel
summary: Servidor de Argentum Online en Python
description: |
  PyAO es un servidor de juego de rol multijugador online (MMORPG)
  implementado en Python 3.14+. Compatible con clientes de Argentum Online.

  Requiere Redis. Instala el snap de Redis o apunta a una instancia externa
  mediante la variable de entorno REDIS_HOST.

  Variables de entorno principales:
    SERVER_HOST      (default: 0.0.0.0)
    SERVER_PORT      (default: 7666)
    REDIS_HOST       (default: localhost)
    REDIS_PORT       (default: 6379)
    REDIS_DB         (default: 0)

  Los datos del juego (mapas, items, NPCs, etc.) se copian automáticamente
  a $SNAP_COMMON la primera vez que se ejecuta el servidor.

grade: devel
confinement: strict
adopt-info: snap-version
architectures:
  - amd64
  - arm64

apps:
  pyao-server:
    command: bin/wrapper
    plugs:
      - network
      - network-bind

parts:
  pyao:
    plugin: python
    source: .
    build-packages:
      - gcc
      - libffi-dev
      - libssl-dev
      - python3-dev
    stage-packages:
      - libffi8
      - libssl3
      - python3
      - python3-venv
    stage:
      - -usr/lib/x86_64-linux-gnu/libBrokenLocale*
      - -usr/lib/x86_64-linux-gnu/libanl*
      - -usr/lib/x86_64-linux-gnu/libc_malloc_debug*
      - -usr/lib/x86_64-linux-gnu/libexpatw*
      - -usr/lib/x86_64-linux-gnu/libformw*
      - -usr/lib/x86_64-linux-gnu/libhistory*
      - -usr/lib/x86_64-linux-gnu/libmemusage*
      - -usr/lib/x86_64-linux-gnu/libmenuw*
      - -usr/lib/x86_64-linux-gnu/libmvec*
      - -usr/lib/x86_64-linux-gnu/libnsl*
      - -usr/lib/x86_64-linux-gnu/libnss_*
      - -usr/lib/x86_64-linux-gnu/libpcprofile*
      - -usr/lib/x86_64-linux-gnu/libthread_db*
      - -usr/lib/x86_64-linux-gnu/libtic.*
      - -usr/lib/x86_64-linux-gnu/libutil*

  game-data:
    plugin: nil
    source: .
    override-build: |
      mkdir -p "${SNAPCRAFT_PART_INSTALL}/share/pyao/data"
      mkdir -p "${SNAPCRAFT_PART_INSTALL}/share/pyao/map_data"
      mkdir -p "${SNAPCRAFT_PART_INSTALL}/share/pyao/config"
      cp -r "${SNAPCRAFT_PART_SRC}/data/." "${SNAPCRAFT_PART_INSTALL}/share/pyao/data/"
      cp -r "${SNAPCRAFT_PART_SRC}/map_data/." "${SNAPCRAFT_PART_INSTALL}/share/pyao/map_data/"
      cp "${SNAPCRAFT_PART_SRC}/config/server.toml" "${SNAPCRAFT_PART_INSTALL}/share/pyao/config/server.toml"

  wrapper:
    plugin: dump
    source: snap/local/
    organize:
      wrapper: bin/wrapper

  snap-version:
    plugin: nil
    source: .
    override-pull: |
      VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
      craftctl set version="$VERSION"
